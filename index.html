<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lookalikes | Campaign</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Lookalikes</h2>
        <p>Select a lookalike list for this campaign</p>
        <button class="close-btn" id="closeBtn">&times;</button>
      </div>

      <div class="modal-body">
        <h3>You don’t have any leads</h3>
        <p class="subtext">Create a lead list to start running campaigns</p>
        <button class="create-btn">Create a List</button>
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
